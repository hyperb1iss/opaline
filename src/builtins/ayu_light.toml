# Ayu Light — Clean warm light color scheme
# https://github.com/ayu-theme/ayu-colors

[meta]
name = "Ayu Light"
author = "Ayu Theme"
variant = "light"
version = "1.0"
description = "Clean warm light scheme with orange accents"

[palette]
# Surface / background
bg_sunk = "#ebeef0"
bg_default = "#f8f9fa"
bg_panel = "#fcfcfc"
bg_popup = "#ffffff"
bg_highlight = "#e8eaed"

# Foreground
fg_default = "#5c6166"
fg_muted = "#828e9f"
fg_subtle = "#abb0b6"

# Accent
accent = "#f29718"

# Syntax
syn_tag = "#55b4d4"
syn_func = "#f2ae49"
syn_entity = "#399ee6"
syn_string = "#86b300"
syn_regexp = "#4cbf99"
syn_markup = "#f07171"
syn_keyword = "#fa8532"
syn_special = "#e59645"
syn_comment = "#abb0b6"
syn_constant = "#a37acc"
syn_operator = "#ed9366"

# VCS / status
vcs_added = "#6cbf43"
vcs_modified = "#478acc"
vcs_removed = "#ff7383"
error = "#e65050"

[tokens]
"text.primary" = "fg_default"
"text.secondary" = "fg_muted"
"text.muted" = "fg_subtle"
"text.dim" = "fg_subtle"

"bg.base" = "bg_popup"
"bg.panel" = "bg_panel"
"bg.code" = "bg_sunk"
"bg.highlight" = "bg_highlight"
"bg.elevated" = "bg_default"
"bg.active" = "bg_sunk"
"bg.selection" = "bg_highlight"

"accent.primary" = "accent"
"accent.secondary" = "syn_entity"
"accent.tertiary" = "syn_tag"
"accent.deep" = "syn_constant"

success = "vcs_added"
error = "error"
warning = "accent"
info = "syn_entity"

"git.staged" = "vcs_added"
"git.modified" = "vcs_modified"
"git.untracked" = "fg_muted"
"git.deleted" = "vcs_removed"

"diff.added" = "vcs_added"
"diff.removed" = "vcs_removed"
"diff.hunk" = "syn_entity"
"diff.context" = "fg_muted"

"border.focused" = "accent"
"border.unfocused" = "bg_highlight"

"code.hash" = "syn_operator"
"code.path" = "syn_entity"
"code.keyword" = "syn_keyword"
"code.function" = "syn_func"
"code.string" = "syn_string"
"code.number" = "syn_constant"
"code.comment" = "syn_comment"
"code.type" = "syn_tag"
"code.line_number" = "fg_subtle"

"mode.active" = "accent"
"mode.inactive" = "fg_subtle"
"mode.hover" = "syn_entity"

[styles]
keyword = { fg = "accent.primary", bold = true }
file_path = { fg = "code.path" }
file_path_bold = { fg = "code.path", bold = true }
commit_hash = { fg = "code.hash" }
line_number = { fg = "code.line_number" }
cursor_line = { bg = "bg.highlight" }
selected = { fg = "accent.secondary", bg = "bg.highlight" }
active_selected = { fg = "accent.primary", bg = "bg.active", bold = true }
focused_border = { fg = "border.focused" }
unfocused_border = { fg = "border.unfocused" }
success_style = { fg = "success" }
error_style = { fg = "error" }
warning_style = { fg = "warning" }
info_style = { fg = "info" }
dimmed = { fg = "text.dim" }
muted = { fg = "text.muted" }
inline_code = { fg = "success", bg = "bg.code" }
mode_active = { fg = "mode.active", bold = true }
mode_inactive = { fg = "mode.inactive" }
mode_hover = { fg = "mode.hover" }
git_staged = { fg = "git.staged" }
git_modified = { fg = "git.modified" }
git_untracked = { fg = "git.untracked" }
git_deleted = { fg = "git.deleted" }
diff_added = { fg = "diff.added" }
diff_removed = { fg = "diff.removed" }
diff_hunk = { fg = "diff.hunk" }
diff_context = { fg = "diff.context" }
author = { fg = "text.primary" }
timestamp = { fg = "warning" }

[gradients]
primary = ["accent", "syn_entity"]
warm = ["syn_keyword", "accent"]
success_gradient = ["vcs_added", "syn_string"]
error_gradient = ["error", "vcs_removed"]
aurora = ["accent", "syn_keyword", "syn_entity", "syn_string", "syn_constant"]
