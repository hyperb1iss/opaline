# Flexoki Dark — Ink-on-paper aesthetic for dark mode
# https://github.com/kepano/flexoki

[meta]
name = "Flexoki Dark"
author = "Steph Ango"
variant = "dark"
version = "1.0"
description = "Ink-on-paper aesthetic with warm, muted tones"

[palette]
# Base / background
black = "#100f0f"
bg_950 = "#1c1b1a"
bg_900 = "#282726"
bg_850 = "#343331"
bg_800 = "#403e3c"

# Foreground
fg_200 = "#cecdc3"
fg_300 = "#b7b5ac"
fg_400 = "#9f9d96"
fg_500 = "#878580"
fg_600 = "#6f6e69"
fg_700 = "#575653"

# Accent colors
red = "#d14d41"
orange = "#da702c"
yellow = "#d0a215"
green = "#879a39"
cyan = "#3aa99f"
blue = "#4385be"
purple = "#8b7ec8"
magenta = "#ce5d97"

# Lighter accent variants (for gradients)
red_light = "#e8705f"
orange_light = "#ec8b49"
green_light = "#a0af54"
cyan_light = "#5abdac"

[tokens]
"text.primary" = "fg_200"
"text.secondary" = "fg_300"
"text.muted" = "fg_500"
"text.dim" = "fg_600"

"bg.base" = "black"
"bg.panel" = "bg_950"
"bg.code" = "bg_950"
"bg.highlight" = "bg_900"
"bg.elevated" = "bg_850"
"bg.active" = "bg_800"
"bg.selection" = "bg_850"

"accent.primary" = "orange"
"accent.secondary" = "blue"
"accent.tertiary" = "magenta"
"accent.deep" = "purple"

success = "green"
error = "red"
warning = "yellow"
info = "cyan"

"git.staged" = "green"
"git.modified" = "yellow"
"git.untracked" = "fg_500"
"git.deleted" = "red"

"diff.added" = "green"
"diff.removed" = "red"
"diff.hunk" = "blue"
"diff.context" = "fg_600"

"border.focused" = "orange"
"border.unfocused" = "fg_700"

"code.hash" = "orange"
"code.path" = "blue"
"code.keyword" = "green"
"code.function" = "orange"
"code.string" = "cyan"
"code.number" = "purple"
"code.comment" = "fg_500"
"code.type" = "yellow"
"code.line_number" = "fg_600"

"mode.active" = "orange"
"mode.inactive" = "fg_600"
"mode.hover" = "blue"

[styles]
keyword = { fg = "accent.primary", bold = true }
file_path = { fg = "code.path" }
file_path_bold = { fg = "code.path", bold = true }
commit_hash = { fg = "code.hash" }
line_number = { fg = "code.line_number" }
cursor_line = { bg = "bg.highlight" }
selected = { fg = "accent.secondary", bg = "bg.highlight" }
active_selected = { fg = "accent.primary", bg = "bg.active", bold = true }
focused_border = { fg = "border.focused" }
unfocused_border = { fg = "border.unfocused" }
success_style = { fg = "success" }
error_style = { fg = "error" }
warning_style = { fg = "warning" }
info_style = { fg = "info" }
dimmed = { fg = "text.dim" }
muted = { fg = "text.muted" }
inline_code = { fg = "success", bg = "bg.code" }
mode_active = { fg = "mode.active", bold = true }
mode_inactive = { fg = "mode.inactive" }
mode_hover = { fg = "mode.hover" }
git_staged = { fg = "git.staged" }
git_modified = { fg = "git.modified" }
git_untracked = { fg = "git.untracked" }
git_deleted = { fg = "git.deleted" }
diff_added = { fg = "diff.added" }
diff_removed = { fg = "diff.removed" }
diff_hunk = { fg = "diff.hunk" }
diff_context = { fg = "diff.context" }
author = { fg = "text.primary" }
timestamp = { fg = "warning" }

[gradients]
primary = ["orange", "blue"]
warm = ["red", "yellow"]
success_gradient = ["green", "cyan"]
error_gradient = ["red", "magenta"]
aurora = ["orange", "yellow", "green", "cyan", "blue", "purple"]
