# Catppuccin Macchiato — Soothing pastel theme
# https://github.com/catppuccin/catppuccin

[meta]
name = "Catppuccin Macchiato"
author = "Catppuccin"
variant = "dark"
version = "1.0"
description = "Soothing pastel theme for the high-spirited"

[palette]
# Base colors
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"
surface0 = "#363a4f"
surface1 = "#494d64"
surface2 = "#5b6078"
overlay0 = "#6e738d"
overlay1 = "#8087a2"
overlay2 = "#939ab7"

# Text
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"

# Accent colors
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"

[tokens]
"text.primary" = "text"
"text.secondary" = "subtext1"
"text.muted" = "subtext0"
"text.dim" = "overlay1"

"bg.base" = "crust"
"bg.panel" = "base"
"bg.code" = "mantle"
"bg.highlight" = "surface0"
"bg.elevated" = "surface1"
"bg.active" = "surface2"
"bg.selection" = "surface1"

"accent.primary" = "mauve"
"accent.secondary" = "sapphire"
"accent.tertiary" = "pink"
"accent.deep" = "lavender"

success = "green"
error = "red"
warning = "yellow"
info = "sky"

"border.focused" = "mauve"
"border.unfocused" = "surface2"

"code.keyword" = "mauve"
"code.function" = "blue"
"code.string" = "green"
"code.number" = "peach"
"code.comment" = "overlay1"
"code.type" = "yellow"
"code.line_number" = "overlay0"

[styles]
keyword = { fg = "accent.primary", bold = true }
line_number = { fg = "code.line_number" }
cursor_line = { bg = "bg.highlight" }
selected = { fg = "accent.secondary", bg = "bg.highlight" }
active_selected = { fg = "accent.primary", bg = "bg.active", bold = true }
focused_border = { fg = "border.focused" }
unfocused_border = { fg = "border.unfocused" }
success_style = { fg = "success" }
error_style = { fg = "error" }
warning_style = { fg = "warning" }
info_style = { fg = "info" }
dimmed = { fg = "text.dim" }
muted = { fg = "text.muted" }
inline_code = { fg = "success", bg = "bg.code" }

[gradients]
primary = ["mauve", "sapphire"]
warm = ["peach", "yellow"]
success_gradient = ["green", "teal"]
error_gradient = ["red", "maroon"]
aurora = ["mauve", "pink", "sapphire", "teal", "green"]
