# Gruvbox Light — Retro groove color scheme
# https://github.com/morhetz/gruvbox

[meta]
name = "Gruvbox Light"
author = "morhetz"
variant = "light"
version = "1.0"
description = "Retro groove color scheme with warm earthy tones"

[palette]
# Backgrounds (light mode)
bg0_h = "#f9f5d7"
bg0 = "#fbf1c7"
bg1 = "#ebdbb2"
bg2 = "#d5c4a1"
bg3 = "#bdae93"
bg4 = "#a89984"

# Foregrounds (light mode)
fg0 = "#1d2021"
fg1 = "#3c3836"
fg2 = "#504945"
fg3 = "#665c54"
fg4 = "#7c6f64"

# Gray
gray = "#928374"

# Colors (neutral)
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
purple = "#b16286"
aqua = "#689d6a"
orange = "#d65d0e"

# Colors (faded)
red_dim = "#9d0006"
green_dim = "#79740e"
yellow_dim = "#b57614"
blue_dim = "#076678"
purple_dim = "#8f3f71"
aqua_dim = "#427b58"
orange_dim = "#af3a03"

[tokens]
"text.primary" = "fg1"
"text.secondary" = "fg2"
"text.muted" = "fg3"
"text.dim" = "fg4"

"bg.base" = "bg0_h"
"bg.panel" = "bg0"
"bg.code" = "bg0"
"bg.highlight" = "bg1"
"bg.elevated" = "bg2"
"bg.active" = "bg3"
"bg.selection" = "bg2"

"accent.primary" = "orange"
"accent.secondary" = "aqua"
"accent.tertiary" = "purple"
"accent.deep" = "blue"

success = "green"
error = "red"
warning = "yellow"
info = "aqua"

"border.focused" = "orange"
"border.unfocused" = "bg4"

"code.keyword" = "red"
"code.function" = "green"
"code.string" = "green"
"code.number" = "purple"
"code.comment" = "gray"
"code.type" = "yellow"
"code.line_number" = "bg4"

[styles]
keyword = { fg = "accent.primary", bold = true }
line_number = { fg = "code.line_number" }
cursor_line = { bg = "bg.highlight" }
selected = { fg = "accent.secondary", bg = "bg.highlight" }
active_selected = { fg = "accent.primary", bg = "bg.active", bold = true }
focused_border = { fg = "border.focused" }
unfocused_border = { fg = "border.unfocused" }
success_style = { fg = "success" }
error_style = { fg = "error" }
warning_style = { fg = "warning" }
info_style = { fg = "info" }
dimmed = { fg = "text.dim" }
muted = { fg = "text.muted" }
inline_code = { fg = "success", bg = "bg.code" }

[gradients]
primary = ["orange", "yellow"]
warm = ["red", "orange"]
success_gradient = ["green", "aqua"]
error_gradient = ["red", "orange"]
aurora = ["red", "orange", "yellow", "green", "aqua"]
