# Light Owl — A theme for light owls
# https://github.com/sdras/night-owl-vscode-theme

[meta]
name = "Light Owl"
author = "Sarah Drasner"
variant = "light"
version = "1.0"
description = "Clean light companion to Night Owl by Sarah Drasner"

[palette]
# Background shades
bg_default = "#fbfbfb"
bg_sidebar = "#f0f0f0"
bg_inset = "#e8eaed"
bg_highlight = "#f0f0f0"
bg_selection = "#d3e8f8"

# Foreground
fg_default = "#403f53"
fg_dim = "#5f6b80"
fg_muted = "#989fb1"
fg_subtle = "#90a7b0"

# Syntax
comment = "#989fb1"
string = "#c96765"
keyword = "#994cc3"
func = "#4876d6"
type_ = "#111111"
number = "#aa0982"
operator = "#0c969b"
variable = "#403f53"
constant = "#4876d6"
tag = "#994cc3"

# Status
green = "#2aa298"
red = "#e64d49"
yellow = "#daaa01"
cyan = "#0c969b"
orange = "#bc5454"
purple = "#994cc3"
blue = "#4876d6"

[tokens]
"text.primary" = "fg_default"
"text.secondary" = "fg_dim"
"text.muted" = "fg_muted"
"text.dim" = "fg_subtle"

"bg.base" = "bg_default"
"bg.panel" = "bg_default"
"bg.code" = "bg_sidebar"
"bg.highlight" = "bg_highlight"
"bg.elevated" = "bg_sidebar"
"bg.active" = "bg_inset"
"bg.selection" = "bg_selection"

"accent.primary" = "keyword"
"accent.secondary" = "func"
"accent.tertiary" = "operator"
"accent.deep" = "number"

success = "green"
error = "red"
warning = "yellow"
info = "blue"

"git.staged" = "green"
"git.modified" = "yellow"
"git.untracked" = "fg_muted"
"git.deleted" = "red"

"diff.added" = "green"
"diff.removed" = "red"
"diff.hunk" = "func"
"diff.context" = "fg_muted"

"border.focused" = "keyword"
"border.unfocused" = "bg_inset"

"code.hash" = "number"
"code.path" = "func"
"code.keyword" = "keyword"
"code.function" = "func"
"code.string" = "string"
"code.number" = "number"
"code.comment" = "comment"
"code.type" = "operator"
"code.line_number" = "fg_muted"

"mode.active" = "keyword"
"mode.inactive" = "fg_muted"
"mode.hover" = "func"

[styles]
keyword = { fg = "accent.primary", bold = true }
file_path = { fg = "code.path" }
file_path_bold = { fg = "code.path", bold = true }
commit_hash = { fg = "code.hash" }
line_number = { fg = "code.line_number" }
cursor_line = { bg = "bg.highlight" }
selected = { fg = "accent.secondary", bg = "bg.highlight" }
active_selected = { fg = "accent.primary", bg = "bg.active", bold = true }
focused_border = { fg = "border.focused" }
unfocused_border = { fg = "border.unfocused" }
success_style = { fg = "success" }
error_style = { fg = "error" }
warning_style = { fg = "warning" }
info_style = { fg = "info" }
dimmed = { fg = "text.dim" }
muted = { fg = "text.muted" }
inline_code = { fg = "success", bg = "bg.code" }
mode_active = { fg = "mode.active", bold = true }
mode_inactive = { fg = "mode.inactive" }
mode_hover = { fg = "mode.hover" }
git_staged = { fg = "git.staged" }
git_modified = { fg = "git.modified" }
git_untracked = { fg = "git.untracked" }
git_deleted = { fg = "git.deleted" }
diff_added = { fg = "diff.added" }
diff_removed = { fg = "diff.removed" }
diff_hunk = { fg = "diff.hunk" }
diff_context = { fg = "diff.context" }
author = { fg = "text.primary" }
timestamp = { fg = "warning" }

[gradients]
primary = ["keyword", "func"]
warm = ["orange", "yellow"]
success_gradient = ["green", "cyan"]
error_gradient = ["red", "orange"]
aurora = ["keyword", "func", "cyan", "green", "yellow"]
