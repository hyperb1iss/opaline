# Flexoki Light — Ink-on-paper aesthetic for light mode
# https://github.com/kepano/flexoki

[meta]
name = "Flexoki Light"
author = "Steph Ango"
variant = "light"
version = "1.0"
description = "Ink-on-paper aesthetic with warm, natural tones"

[palette]
# Base / background
paper = "#fffcf0"
bg_50 = "#f2f0e5"
bg_100 = "#e6e4d9"
bg_150 = "#dad8ce"
bg_200 = "#cecdc3"

# Foreground
fg_black = "#100f0f"
fg_800 = "#403e3c"
fg_700 = "#575653"
fg_600 = "#6f6e69"
fg_500 = "#878580"

# Accent colors (darker for light mode)
red = "#af3029"
orange = "#bc5215"
yellow = "#ad8301"
green = "#66800b"
cyan = "#24837b"
blue = "#205ea6"
purple = "#5e409d"
magenta = "#a02f6f"

# Lighter accent variants
red_light = "#d14d41"
orange_light = "#da702c"
green_light = "#879a39"
cyan_light = "#3aa99f"

[tokens]
"text.primary" = "fg_black"
"text.secondary" = "fg_700"
"text.muted" = "fg_600"
"text.dim" = "fg_500"

"bg.base" = "paper"
"bg.panel" = "paper"
"bg.code" = "bg_50"
"bg.highlight" = "bg_50"
"bg.elevated" = "bg_100"
"bg.active" = "bg_150"
"bg.selection" = "bg_100"

"accent.primary" = "orange"
"accent.secondary" = "blue"
"accent.tertiary" = "magenta"
"accent.deep" = "purple"

success = "green"
error = "red"
warning = "yellow"
info = "cyan"

"border.focused" = "orange"
"border.unfocused" = "bg_200"

"code.keyword" = "green"
"code.function" = "orange"
"code.string" = "cyan"
"code.number" = "purple"
"code.comment" = "fg_600"
"code.type" = "yellow"
"code.line_number" = "fg_500"

[styles]
keyword = { fg = "accent.primary", bold = true }
line_number = { fg = "code.line_number" }
cursor_line = { bg = "bg.highlight" }
selected = { fg = "accent.secondary", bg = "bg.highlight" }
active_selected = { fg = "accent.primary", bg = "bg.active", bold = true }
focused_border = { fg = "border.focused" }
unfocused_border = { fg = "border.unfocused" }
success_style = { fg = "success" }
error_style = { fg = "error" }
warning_style = { fg = "warning" }
info_style = { fg = "info" }
dimmed = { fg = "text.dim" }
muted = { fg = "text.muted" }
inline_code = { fg = "success", bg = "bg.code" }

[gradients]
primary = ["orange", "blue"]
warm = ["red", "yellow"]
success_gradient = ["green", "cyan"]
error_gradient = ["red", "magenta"]
aurora = ["orange", "yellow", "green", "cyan", "blue", "purple"]
