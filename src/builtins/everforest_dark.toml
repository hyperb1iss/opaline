# Everforest Dark — Comfortable and pleasant green forest theme
# https://github.com/sainnhe/everforest

[meta]
name = "Everforest Dark"
author = "sainnhe"
variant = "dark"
version = "1.0"
description = "Warm green forest palette designed for long coding sessions"

[palette]
# Backgrounds (medium contrast)
bg_dim = "#232A2E"
bg0 = "#2D353B"
bg1 = "#343F44"
bg2 = "#3D484D"
bg3 = "#475258"
bg4 = "#4F585E"

# Foreground
fg = "#D3C6AA"
red = "#E67E80"
orange = "#E69875"
yellow = "#DBBC7F"
green = "#A7C080"
aqua = "#83C092"
blue = "#7FBBB3"
purple = "#D699B6"
grey0 = "#7A8478"
grey1 = "#859289"
grey2 = "#9DA9A0"

[tokens]
"text.primary" = "fg"
"text.secondary" = "grey2"
"text.muted" = "grey1"
"text.dim" = "grey0"

"bg.base" = "bg_dim"
"bg.panel" = "bg0"
"bg.code" = "bg1"
"bg.highlight" = "bg1"
"bg.elevated" = "bg2"
"bg.active" = "bg3"
"bg.selection" = "bg2"

"accent.primary" = "green"
"accent.secondary" = "blue"
"accent.tertiary" = "aqua"
"accent.deep" = "purple"

success = "green"
error = "red"
warning = "yellow"
info = "blue"

"border.focused" = "green"
"border.unfocused" = "bg4"

"code.keyword" = "red"
"code.function" = "blue"
"code.string" = "green"
"code.number" = "orange"
"code.comment" = "grey1"
"code.type" = "yellow"
"code.line_number" = "grey0"

[styles]
keyword = { fg = "accent.primary", bold = true }
line_number = { fg = "code.line_number" }
cursor_line = { bg = "bg.highlight" }
selected = { fg = "accent.secondary", bg = "bg.highlight" }
active_selected = { fg = "accent.primary", bg = "bg.active", bold = true }
focused_border = { fg = "border.focused" }
unfocused_border = { fg = "border.unfocused" }
success_style = { fg = "success" }
error_style = { fg = "error" }
warning_style = { fg = "warning" }
info_style = { fg = "info" }
dimmed = { fg = "text.dim" }
muted = { fg = "text.muted" }
inline_code = { fg = "success", bg = "bg.code" }

[gradients]
primary = ["green", "blue"]
warm = ["orange", "yellow"]
success_gradient = ["green", "aqua"]
error_gradient = ["red", "orange"]
aurora = ["green", "aqua", "blue", "purple", "red"]
