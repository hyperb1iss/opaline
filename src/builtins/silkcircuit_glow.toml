# SilkCircuit Glow — Maximum neon intensity
# Pure blacks with maximum saturation colors for ultimate contrast

[meta]
name = "SilkCircuit Glow"
author = "hyperb1iss"
variant = "dark"
version = "1.0"
description = "Pure neon colors against deep black backgrounds"

# ═══════════════════════════════════════════════════════════════════════════════
# Palette — Raw color primitives
# ═══════════════════════════════════════════════════════════════════════════════

[palette]
# Core brand colors (pure neon)
purple_500 = "#ff00ff"
cyan_400 = "#00ffff"
coral_400 = "#ff0099"
yellow_400 = "#ffff00"
green_400 = "#00ff00"
red_400 = "#ff0066"

# Extended palette
purple_400 = "#cc66ff"
purple_600 = "#9900cc"
cyan_500 = "#00cccc"
magenta_400 = "#ff00ff"
purple_300 = "#dd99ff"
pink_400 = "#ff66ff"
pink_300 = "#ff99ff"

# Backgrounds (pure black)
gray_950 = "#0a0816"
gray_900 = "#0e0c18"
gray_850 = "#12101c"
gray_800 = "#1a0033"
gray_750 = "#200040"
gray_700 = "#2a0055"
gray_600 = "#330066"

# Text colors
gray_50 = "#ffffff"
gray_200 = "#eeeeff"
gray_400 = "#aa99cc"
gray_500 = "#cc66ff"

# ═══════════════════════════════════════════════════════════════════════════════
# Tokens — Semantic color assignments
# ═══════════════════════════════════════════════════════════════════════════════

[tokens]
# Text hierarchy
"text.primary" = "gray_50"
"text.secondary" = "gray_200"
"text.muted" = "gray_400"
"text.dim" = "gray_500"

# Backgrounds
"bg.base" = "gray_950"
"bg.panel" = "gray_900"
"bg.code" = "gray_850"
"bg.highlight" = "gray_800"
"bg.elevated" = "gray_750"
"bg.active" = "gray_700"
"bg.selection" = "gray_600"

# Accent colors
"accent.primary" = "purple_500"
"accent.secondary" = "cyan_400"
"accent.tertiary" = "coral_400"
"accent.deep" = "purple_400"

# Semantic colors
success = "green_400"
error = "red_400"
warning = "yellow_400"
info = "cyan_400"

# UI elements
"border.focused" = "cyan_400"
"border.unfocused" = "gray_400"

# Code elements
"code.keyword" = "purple_500"
"code.function" = "cyan_400"
"code.string" = "pink_300"
"code.number" = "coral_400"
"code.comment" = "gray_500"
"code.type" = "yellow_400"
"code.line_number" = "gray_500"

# ═══════════════════════════════════════════════════════════════════════════════
# Styles — Composed styles with modifiers
# ═══════════════════════════════════════════════════════════════════════════════

[styles]
# Keywords and importance
keyword = { fg = "accent.primary", bold = true }

# Line numbers
line_number = { fg = "code.line_number" }

# Cursor line
cursor_line = { bg = "bg.highlight" }

# Selection states
selected = { fg = "accent.secondary", bg = "bg.highlight" }
active_selected = { fg = "accent.primary", bg = "bg.active", bold = true }

# Borders
focused_border = { fg = "border.focused" }
unfocused_border = { fg = "border.unfocused" }

# Status messages
success_style = { fg = "success" }
error_style = { fg = "error" }
warning_style = { fg = "warning" }
info_style = { fg = "info" }

# Text styles
dimmed = { fg = "text.dim" }
muted = { fg = "text.muted" }

# Inline code
inline_code = { fg = "success", bg = "bg.code" }

# ═══════════════════════════════════════════════════════════════════════════════
# Gradients — Color transitions
# ═══════════════════════════════════════════════════════════════════════════════

[gradients]
# Primary brand gradient: Pure Magenta -> Pure Cyan
primary = ["purple_500", "cyan_400"]

# Warm accent gradient: Hot Pink -> Pure Yellow
warm = ["coral_400", "yellow_400"]

# Success gradient: Pure Green -> Pure Cyan
success_gradient = ["green_400", "cyan_400"]

# Error gradient: Hot Red -> Hot Pink
error_gradient = ["red_400", "coral_400"]

# Aurora gradient (5-stop): Maximum neon sweep
aurora = ["purple_500", "#ff0099", "#ff00ff", "#9900ff", "cyan_400"]
