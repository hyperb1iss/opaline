# Palenight — Material Palenight with purple-blue depths
# https://github.com/marko-cerovac/material.nvim

[meta]
name = "Palenight"
author = "Material Theme"
variant = "dark"
version = "1.0"
description = "Purple-blue depths with pastel accents from Material Palenight"

[palette]
# Background shades
bg_deep = "#1b1e2b"
bg_default = "#292d3e"
bg_panel = "#2f3344"
bg_selection = "#444267"
bg_highlight = "#414863"

# Foreground
fg_default = "#a6accd"
fg_muted = "#717cb4"
fg_subtle = "#676e95"
fg_disabled = "#515772"

# Border
border = "#364367"

# Syntax
comment = "#676e95"
string = "#c3e88d"
keyword = "#c792ea"
func = "#82aaff"
type_ = "#ffcb6b"
number = "#f78c6c"
operator = "#89ddff"
variable = "#a6accd"
constant = "#f78c6c"
tag = "#f07178"
parameter = "#b0c9ff"

# Status
green = "#c3e88d"
red = "#f07178"
yellow = "#ffcb6b"
cyan = "#89ddff"
orange = "#f78c6c"
purple = "#c792ea"
blue = "#82aaff"

[tokens]
"text.primary" = "fg_default"
"text.secondary" = "fg_muted"
"text.muted" = "fg_subtle"
"text.dim" = "fg_disabled"

"bg.base" = "bg_deep"
"bg.panel" = "bg_default"
"bg.code" = "bg_deep"
"bg.highlight" = "bg_highlight"
"bg.elevated" = "bg_panel"
"bg.active" = "bg_selection"
"bg.selection" = "bg_selection"

"accent.primary" = "keyword"
"accent.secondary" = "func"
"accent.tertiary" = "cyan"
"accent.deep" = "purple"

success = "green"
error = "red"
warning = "yellow"
info = "cyan"

"border.focused" = "keyword"
"border.unfocused" = "border"

"code.keyword" = "keyword"
"code.function" = "func"
"code.string" = "string"
"code.number" = "number"
"code.comment" = "comment"
"code.type" = "yellow"
"code.line_number" = "fg_subtle"

[styles]
keyword = { fg = "accent.primary", bold = true }
line_number = { fg = "code.line_number" }
cursor_line = { bg = "bg.highlight" }
selected = { fg = "accent.secondary", bg = "bg.highlight" }
active_selected = { fg = "accent.primary", bg = "bg.active", bold = true }
focused_border = { fg = "border.focused" }
unfocused_border = { fg = "border.unfocused" }
success_style = { fg = "success" }
error_style = { fg = "error" }
warning_style = { fg = "warning" }
info_style = { fg = "info" }
dimmed = { fg = "text.dim" }
muted = { fg = "text.muted" }
inline_code = { fg = "success", bg = "bg.code" }

[gradients]
primary = ["keyword", "func"]
warm = ["orange", "yellow"]
success_gradient = ["green", "cyan"]
error_gradient = ["red", "orange"]
aurora = ["keyword", "func", "cyan", "green", "yellow"]
