# Monokai Pro — The iconic Monokai color scheme
# https://monokai.pro/

[meta]
name = "Monokai Pro"
author = "Monokai"
variant = "dark"
version = "1.0"
description = "The iconic Monokai color scheme — warm dark tones with vibrant syntax"

[palette]
# Background shades
bg_deep = "#19181a"
bg_dark = "#221f22"
bg_default = "#2d2a2e"
bg_light = "#403e41"
bg_lighter = "#5b595c"

# Foreground
fg_default = "#fcfcfa"
fg_dim = "#c1c0c0"
fg_muted = "#939293"
fg_subtle = "#727072"

# Core syntax
red = "#ff6188"
orange = "#fc9867"
yellow = "#ffd866"
green = "#a9dc76"
blue = "#78dce8"
purple = "#ab9df2"

# Extended
comment = "#727072"
white = "#fcfcfa"

[tokens]
"text.primary" = "fg_default"
"text.secondary" = "fg_dim"
"text.muted" = "fg_muted"
"text.dim" = "fg_subtle"

"bg.base" = "bg_deep"
"bg.panel" = "bg_default"
"bg.code" = "bg_dark"
"bg.highlight" = "bg_light"
"bg.elevated" = "bg_light"
"bg.active" = "bg_lighter"
"bg.selection" = "bg_light"

"accent.primary" = "red"
"accent.secondary" = "blue"
"accent.tertiary" = "purple"
"accent.deep" = "orange"

success = "green"
error = "red"
warning = "orange"
info = "blue"

"git.staged" = "green"
"git.modified" = "yellow"
"git.untracked" = "fg_subtle"
"git.deleted" = "red"

"diff.added" = "green"
"diff.removed" = "red"
"diff.hunk" = "blue"
"diff.context" = "fg_subtle"

"border.focused" = "fg_muted"
"border.unfocused" = "bg_lighter"

"code.hash" = "orange"
"code.path" = "blue"
"code.keyword" = "red"
"code.function" = "green"
"code.string" = "yellow"
"code.number" = "purple"
"code.comment" = "comment"
"code.type" = "blue"
"code.line_number" = "fg_subtle"

"mode.active" = "red"
"mode.inactive" = "fg_subtle"
"mode.hover" = "blue"

[styles]
keyword = { fg = "accent.primary", bold = true }
file_path = { fg = "code.path" }
file_path_bold = { fg = "code.path", bold = true }
commit_hash = { fg = "code.hash" }
line_number = { fg = "code.line_number" }
cursor_line = { bg = "bg.highlight" }
selected = { fg = "accent.secondary", bg = "bg.highlight" }
active_selected = { fg = "accent.primary", bg = "bg.active", bold = true }
focused_border = { fg = "border.focused" }
unfocused_border = { fg = "border.unfocused" }
success_style = { fg = "success" }
error_style = { fg = "error" }
warning_style = { fg = "warning" }
info_style = { fg = "info" }
dimmed = { fg = "text.dim" }
muted = { fg = "text.muted" }
inline_code = { fg = "success", bg = "bg.code" }
mode_active = { fg = "mode.active", bold = true }
mode_inactive = { fg = "mode.inactive" }
mode_hover = { fg = "mode.hover" }
git_staged = { fg = "git.staged" }
git_modified = { fg = "git.modified" }
git_untracked = { fg = "git.untracked" }
git_deleted = { fg = "git.deleted" }
diff_added = { fg = "diff.added" }
diff_removed = { fg = "diff.removed" }
diff_hunk = { fg = "diff.hunk" }
diff_context = { fg = "diff.context" }
author = { fg = "text.primary" }
timestamp = { fg = "warning" }

[gradients]
primary = ["red", "purple"]
warm = ["orange", "yellow"]
success_gradient = ["green", "blue"]
error_gradient = ["red", "orange"]
aurora = ["red", "orange", "yellow", "green", "blue", "purple"]
