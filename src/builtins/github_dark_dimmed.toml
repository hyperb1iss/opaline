# GitHub Dark Dimmed — GitHub's signature dark dimmed theme
# https://github.com/primer/github-vscode-theme

[meta]
name = "GitHub Dark Dimmed"
author = "Primer"
variant = "dark"
version = "1.0"
description = "GitHub's signature dark dimmed theme"

[palette]
# Canvas / backgrounds
canvas_default = "#22272e"
canvas_overlay = "#2d333b"
canvas_inset = "#1c2128"
canvas_subtle = "#2d333b"

# Foreground
fg_default = "#adbac7"
fg_muted = "#768390"
fg_subtle = "#636e7b"
fg_on_emphasis = "#cdd9e5"

# Border
border_default = "#444c56"
border_muted = "#373e47"

# Scale colors — accent / semantic
blue3 = "#6cb6ff"
blue4 = "#539bf5"
blue5 = "#4184e4"
green3 = "#6bc46d"
green4 = "#57ab5a"
red3 = "#ff938a"
red4 = "#f47067"
red5 = "#e5534b"
yellow3 = "#daaa3f"
yellow4 = "#c69026"
orange3 = "#f69d50"
orange4 = "#e0823d"
purple3 = "#dcbdfb"
purple4 = "#b083f0"
pink3 = "#fc8dc7"
coral3 = "#f79981"

# Syntax (prettylights)
syn_comment = "#768390"
syn_constant = "#6cb6ff"
syn_entity = "#dcbdfb"
syn_entity_tag = "#8ddb8c"
syn_keyword = "#f47067"
syn_string = "#96d0ff"
syn_variable = "#f69d50"

[tokens]
"text.primary" = "fg_default"
"text.secondary" = "fg_muted"
"text.muted" = "fg_subtle"
"text.dim" = "border_default"

"bg.base" = "canvas_inset"
"bg.panel" = "canvas_default"
"bg.code" = "canvas_inset"
"bg.highlight" = "canvas_overlay"
"bg.elevated" = "canvas_subtle"
"bg.active" = "border_muted"
"bg.selection" = "canvas_overlay"

"accent.primary" = "blue4"
"accent.secondary" = "purple3"
"accent.tertiary" = "coral3"
"accent.deep" = "blue3"

success = "green4"
error = "red5"
warning = "yellow4"
info = "blue3"

"border.focused" = "blue4"
"border.unfocused" = "border_muted"

"code.keyword" = "syn_keyword"
"code.function" = "syn_entity"
"code.string" = "syn_string"
"code.number" = "syn_constant"
"code.comment" = "syn_comment"
"code.type" = "yellow3"
"code.line_number" = "fg_subtle"

[styles]
keyword = { fg = "accent.primary", bold = true }
line_number = { fg = "code.line_number" }
cursor_line = { bg = "bg.highlight" }
selected = { fg = "accent.secondary", bg = "bg.highlight" }
active_selected = { fg = "accent.primary", bg = "bg.active", bold = true }
focused_border = { fg = "border.focused" }
unfocused_border = { fg = "border.unfocused" }
success_style = { fg = "success" }
error_style = { fg = "error" }
warning_style = { fg = "warning" }
info_style = { fg = "info" }
dimmed = { fg = "text.dim" }
muted = { fg = "text.muted" }
inline_code = { fg = "success", bg = "bg.code" }

[gradients]
primary = ["blue4", "purple3"]
warm = ["orange3", "yellow3"]
success_gradient = ["green4", "green3"]
error_gradient = ["red5", "red3"]
aurora = ["blue4", "purple3", "coral3", "green3", "yellow3"]
